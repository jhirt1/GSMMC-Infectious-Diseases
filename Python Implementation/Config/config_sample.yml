outputLocation: ./output
directory: ./data

nSim: 100
tSpan: 365
populationSize: 1000
initialInfected: 10
seed: 12345

sig2: 1.0
rcd: 14
ved: 7
rimmd: 180

generatorDistribution: configured

syntheticPopulation:
  static:
    age:
      categories: ["0-17", "18-49", "50-64", "65+"]
      weights: [0.22, 0.45, 0.20, 0.13]

    comorbidity:
      probabilityTrue: 0.25

    socialActivity:
      categories: ["high", "medium", "low"]
      weights: [0.25, 0.50, 0.25]

    geography:
      categories: ["urban", "rural"]
      weights: [0.80, 0.20]

    mobility:
      categories: ["independent", "assisted", "immobile"]
      weights: [0.85, 0.12, 0.03]

    vaccineAcceptance:
      probabilityTrue: 0.75

infectionRiskMultipliers:
  age:
    "0-17": 0.75
    "18-49": 1.0
    "50-64": 1.0
    "65+": 1.25

  comorbidity:
    "true": 1.25
    "false": 1.0

  socialActivity:
    high: 1.25
    medium: 1.0
    low: 0.75

  geography:
    urban: 1.25
    rural: 1.0

  mobility:
    independent: 1.0
    assisted: 1.0
    immobile: 0.75

  vaccineAcceptance:
    "true": 0.75
    "false": 1.0